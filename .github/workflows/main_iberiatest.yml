# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - iberiatest

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://pmtestcontainerregistry.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_0c0ca0dabb0d40acb805de2f7fa2f6d7 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_48696b9523a9454fb78dbca4eefd1536 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: pmtestcontainerregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_0c0ca0dabb0d40acb805de2f7fa2f6d7 }}/sample-app-aoai-chatgpt:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'iberiatest'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_ca7731993b214ed5af7026f913e9de27 }}
        images: 'pmtestcontainerregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_0c0ca0dabb0d40acb805de2f7fa2f6d7 }}/sample-app-aoai-chatgpt:${{ github.sha }}'