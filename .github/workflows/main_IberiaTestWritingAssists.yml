# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - IberiaTestWritingAssists

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://pmtest.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_bdfc89c314bf45aa89988790edfbebce }}
        password: ${{ secrets.AzureAppService_ContainerPassword_294afa0fe59a4ad9b57fa8728fca685b }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: pmtest.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_bdfc89c314bf45aa89988790edfbebce }}/sampleappaoaichatgpt.azurecr.io/sample-app-aoai-chatgpt:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'IberiaTestWritingAssists'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_d0c025670db14940bafe704878df8146 }}
        images: 'pmtest.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_bdfc89c314bf45aa89988790edfbebce }}/sampleappaoaichatgpt.azurecr.io/sample-app-aoai-chatgpt:${{ github.sha }}'